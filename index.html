<!doctype html>
<html>

    <link rel="icon" type="image/x-icon" href="assets/icon1.png">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&display=swap" rel="stylesheet">

<style>
  .parallax-center {
    transform: translate(-50%, calc(-50% + var(--parallax-y, 0px)));
  }

  .parallax-side {
    transform: translate(0, calc(-50% + var(--parallax-y, 0px)));
  }

  .parallax-cover {
    transform: translateY(var(--parallax-y, 0px));
  }
</style>

</head>


<body class="bg-[#454545]">
  <header class="absolute left-0 top-0 z-50 w-full">
    <nav class="md:mt-6 font-[Inter]">
      <ul class="hidden md:flex items-center md:justify-center md:gap-5 md:text-sm">

        <li class="md:mx-5"><a href="index.html"><img src="assets/logoblack.png" alt="Nocturne Battlegrounds Logo"></a></li>
        <li><a href="about.html">DEV LOGS</a></li> 
        <li><a href="index.html">LEADERBOARD</a></li>
      </ul>

    <div class="absolute right-12 top-12 hidden items-center font-[Koulen] text-sm md:flex">

  <main>
  <section class="relative h-screen bg-[#454545]">

    <h1 class="parallaxtext absolute left-1/2 top-[48%] z-[38] parallax-center text-center font-['Koulen'] text-[clamp(105px,13.2vw,210px)] text-[#101010] leading-[clamp(84px,10.2vw,160px)]"

      <span class="text-[clamp(165px,20.8vw,330px)]">NOCTURNE</span> BATTLEGROUNDS
    </h1>

    <!-- Main center element in front -->
    <img 
      src="assets/animation.gif"
      class="parallax absolute left-1/2 top-[70%] z-50 w-[clamp(850px,102vw,1600px)] parallax-center"
      data-speed="0.35"
      alt="Main character"
    >

    <img 
      src="assets/redbg.png"
      class="parallax absolute left-1/2 top-[145%] z-[11] w-[110vw] max-w-none parallax-center"
      data-speed="0.85"
      alt=""
    >

    <!-- Left side layers -->
    <img 
      src="assets/lamp.png" 
      class="parallax absolute left-[clamp(115px,13.9vw,240px)] top-[95%] w-[clamp(32px,3.65vw,65px)] z-40 parallax-side"
      data-speed="0.55"
      alt=""
    >

    <img 
      src="assets/building1left.png" 
      class="parallax absolute left-0 top-[60%] w-[clamp(120px,13.9vw,245px)] z-40 parallax-side"
      data-speed="0.45"
      alt=""
    >

    <img 
      src="assets/building2left.png" 
      class="parallax absolute left-0 top-[70%] w-[clamp(190px,21.2vw,370px)] z-20 parallax-side"
      data-speed="0.65"
      alt=""
    >

    <img 
      src="assets/building3left.png" 
      class="parallax absolute left-[clamp(150px,18.8vw,330px)] top-[80%] w-[clamp(90px,10.2vw,190px)] z-10 parallax-side"
      data-speed="0.85"
      alt=""
    >

    <!-- Right side layers -->
    <img 
      src="assets/lamp.png" 
      class="parallax absolute right-[clamp(115px,13.9vw,240px)] top-[95%] w-[clamp(32px,3.65vw,65px)] z-40 parallax-side"
      data-speed="0.55"
      alt=""
    >

    <img 
      src="assets/building1right.png" 
      class="parallax absolute right-0 top-[60%] w-[clamp(120px,13.9vw,245px)] z-40 parallax-side"
      data-speed="0.45"
      alt=""
    >

    <img 
      src="assets/building2right.png" 
      class="parallax absolute right-0 top-[70%] w-[clamp(190px,21.2vw,370px)] z-20 parallax-side"
      data-speed="0.65"
      alt=""
    >

    <img 
      src="assets/building3right.png" 
      class="parallax absolute right-[clamp(150px,18.8vw,330px)] top-[80%] w-[clamp(90px,10.2vw,190px)] z-10 parallax-side"

      alt=""

  <section class="relative h-[100vh] bg-[#913030]">

    </div>
  </section>

  <div class="bottom-0 left-0 right-0 h-16 bg-[#222222]"></div>
</main>
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
  const parallaxItems = document.querySelectorAll(".parallax");

  function moveParallax() {
    const scrollY = window.scrollY;

    parallaxItems.forEach((item) => {
      const speed = Number(item.dataset.speed || 0);
      const movement = -scrollY * speed;

      item.style.setProperty("--parallax-y", `${movement}px`);
    });
  }

  window.addEventListener("scroll", moveParallax);
  moveParallax();
</script>

<script>
  const parallaxtexts = document.querySelectorAll(".parallaxtext");

  function moveParallax() {
    const scrollY = window.scrollY;

    parallaxtexts.forEach((item) => {
      const speed = Number(item.dataset.speed || 0);
      const movement = scrollY * speed;

      item.style.setProperty("--parallax-y", `${movement}px`);
    });
  }

  window.addEventListener("scroll", moveParallax);
  moveParallax();
</script>

</body>
</html>
