<!doctype html>
<html>
<head>

<style>
  .parallax-center {
    transform: translate(-50%, calc(-50% + var(--parallax-y, 0px)));
  }

  .parallax-side {
    transform: translate(0, calc(-50% + var(--parallax-y, 0px)));
  }
</style>

</head>


<body class="bg-[#454545]">

    <nav class="md:mt-6 font-[Inter]">
      <ul class="hidden md:flex items-center md:justify-center md:gap-5 md:text-sm">

    <div class="absolute right-12 top-12 hidden items-center font-[Koulen] text-sm md:flex">

        <span class="text-[#CACACA] opacity-70">PATCH</span><span class="text-[#CACACA]">V1.0</span>
      </div>
      </div>

  </header>

  <main>
    <section class="relative h-screen bg-[#454545]">
  <!-- Center objects -->
  <h1 class="parallaxtext absolute left-1/2 top-[48%] z-40 parallax-center text-center font-['Koulen'] text-[180px] text-[#101010] leading-[140px]"
      data-speed="0.50">
    <span class="text-[285px]">NOCTURNE</span> BATTLEGROUNDS
  </h1>

  <!-- Main center element in front -->
  <img 
    src="assets/animation.gif"
    class="parallax absolute left-1/2 top-[70%] z-50 w-[1400px] parallax-center"
    data-speed="0.35"
    alt="Main character"
  >

   <img 
    src="assets/redbg.png"
    class="parallax absolute left-1/2 top-[135%] z-[11] w-screen parallax-center"
    data-speed="0.65"
    alt="Main character"
  >

  <!-- Left side layers -->
  <img 
    src="assets/lamp.png" 
    class="parallax absolute left-[190px] top-[95%] w-[50px] z-40 parallax-side"
    data-speed="0.55"
    alt=""
  >

  <img 
    src="assets/building1left.png" 
    class="parallax absolute left-0 top-[60%] w-[190px] z-30 parallax-side"
    data-speed="0.45"
    alt=""
  >

  <img 
    src="assets/building2left.png" 
    class="parallax absolute left-0 top-[70%] w-[290px] z-20 parallax-side"
    data-speed="0.65"
    alt=""
  >

  <img 
    src="assets/building3left.png" 
    class="parallax absolute left-[280px] w-[140px] top-[80%] z-10 parallax-side"
    data-speed="0.85"
    alt=""
  >

  <!-- Right side layers -->
  <img 
    src="assets/lamp.png" 
    class="parallax absolute right-[190px] top-[95%] w-[50px] z-40 parallax-side"
    data-speed="0.55"
    alt=""
  >

  <img 
    src="assets/building1right.png" 
    class="parallax absolute right-0 top-[60%] w-[190px] z-30 parallax-side"
    data-speed="0.55"
    alt=""
  >

  <img 
    src="assets/building2right.png" 
    class="parallax absolute right-0 top-[70%] w-[290px] z-20 parallax-side"

    alt=""

  <img 
    src="assets/building3right.png" 
    class="parallax absolute right-[278px] top-[80%] w-[140px] z-10 parallax-side"

    alt=""

</section>
<section class="relative mt-[100px] h-[100vh] z-[50] bg-[#913030]"></section>

  <div class="bottom-0 left-0 right-0 h-16 bg-[#222222]"></div>
  </main>
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
  const parallaxItems = document.querySelectorAll(".parallax");

  function moveParallax() {
    const scrollY = window.scrollY;

    parallaxItems.forEach((item) => {
      const speed = Number(item.dataset.speed || 0);
      const movement = -scrollY * speed;

      item.style.setProperty("--parallax-y", `${movement}px`);
    });
  }

  window.addEventListener("scroll", moveParallax);
  moveParallax();
</script>

<script>
  const parallaxtexts = document.querySelectorAll(".parallaxtext");

  function moveParallax() {
    const scrollY = window.scrollY;

    parallaxtexts.forEach((item) => {
      const speed = Number(item.dataset.speed || 0);
      const movement = scrollY * speed;

      item.style.setProperty("--parallax-y", `${movement}px`);
    });
  }

  window.addEventListener("scroll", moveParallax);
  moveParallax();
</script>

</body>
