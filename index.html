<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nocturne Battlegrounds</title>
    <link rel="icon" type="image/x-icon" href="assets/logo.png">
  
    <link href="./src/output.css" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Koulen&display=swap" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#454545]">
  <header class="md:relative">
    <nav class="md:mt-6 font-[Inter]">
      <ul class="hidden md:flex items-center md:justify-center md:gap-5 md:text-sm">
        <li><a href="index.html">CHARACTERS</a></li>
        <li><a href="about.html">FAQ</a></li>
        <li class="md:mx-5"><a href="index.html"><img src="assets/logoblack.png" alt="Nocturne Battlegrounds Logo"></a></li>
        <li><a href="about.html">DEV LOGS</a></li> 
        <li><a href="index.html">LEADERBOARD</a></li>
      </ul>
    </nav>

    <div class="absolute right-12 top-6 hidden items-center font-[Koulen] text-sm md:flex">
      <div class="flex items-center gap-2">
        <span class="h-2.5 w-2.5 rounded-full bg-[#028F52]"></span>
        <span class="text-[#CACACA] opacity-70">ONLINE</span><span class="text-[#CACACA] mr-4">10K</span>

        <span class="text-[#CACACA] opacity-70">PATCH</span><span class="text-[#CACACA]">V1.0</span>
      </div>

  </header>

  <main>
    <section class="relative h-screen overflow-hidden bg-[#454545]">
  <!-- Center objects -->
  <h1 class="parallax absolute left-1/2 top-1/2 z-20 -translate-x-1/2 -translate-y-1/2 font-['Koulen'] text-8xl text-black"
      data-speed="0.12">
    NOCTURNE BATTLEGROUNDS
  </h1>

  <!-- Main center element in front -->
  <img 
    src="assets/fountainbloodtest 1.png"
    class="parallax absolute left-1/2 top-1/2 z-40 w-[650px] -translate-x-1/2 -translate-y-1/2"
    data-speed="0.22"
    alt="Main character"
  >

  <!-- Left side layers -->
  <img 
    src="assets/lamp.png" 
    class="parallax absolute left-0 top-1/2 z-20 -translate-y-1/2"
    data-speed="0.25"
    alt=""
  >

  <img 
    src="assets/building1left.png" 
    class="parallax absolute left-0 top-1/2 z-10 -translate-y-1/2"
    data-speed="0.35"
    alt=""
  >

  <img 
    src="assets/building2left.png" 
    class="parallax absolute left-0 top-1/2 z-0 -translate-y-1/2"
    data-speed="0.45"
    alt=""
  >

  <img 
    src="assets/building3left.png" 
    class="parallax absolute left-0 top-1/2 z-0 -translate-y-1/2"
    data-speed="0.55"
    alt=""
  >

  <!-- Right side layers -->
  <img 
    src="assets/lamp.png" 
    class="parallax absolute right-0 top-1/2 z-20 -translate-y-1/2"
    data-speed="0.25"
    alt=""
  >

  <img 
    src="assets/building1right.png" 
    class="parallax absolute right-0 top-1/2 z-10 -translate-y-1/2"
    data-speed="0.35"
    alt=""
  >

  <img 
    src="assets/building2right.png" 
    class="parallax absolute right-0 top-1/2 z-0 -translate-y-1/2"
    data-speed="0.45"
    alt=""
  >

  <img 
    src="assets/building3right.png" 
    class="parallax absolute right-0 top-1/2 z-0 -translate-y-1/2"
    data-speed="0.55"
    alt=""
  >

  </main>
